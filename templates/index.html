<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crop Yield Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: 'Poppins', sans-serif; min-height: 100vh; padding: 20px 0; }
      .main-container { max-width: 500px; margin: 0 auto; background: rgba(255, 255, 255, 0.95); border-radius: 25px; padding: 40px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); backdrop-filter: blur(10px); position: relative; overflow: hidden; margin-bottom: 30px; }
      .dashboard-container { max-width: 1200px; margin: 0 auto 30px auto; background: rgba(255, 255, 255, 0.95); border-radius: 25px; padding: 40px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); backdrop-filter: blur(10px); position: relative; overflow: hidden; }
      .main-container::before, .dashboard-container::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px; background: linear-gradient(90deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4, #feca57); background-size: 300% 300%; animation: gradientShift 3s ease infinite; }
      @keyframes gradientShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
      .header-section { text-align: center; margin-bottom: 30px; }
      .main-title { font-size: 24px; font-weight: 700; color: #2c3e50; margin-bottom: 8px; }
      .dashboard-title { font-size: 28px; font-weight: 700; color: #2c3e50; margin-bottom: 8px; }
      .subtitle { font-size: 16px; color: #e74c3c; font-weight: 500; margin-bottom: 20px; }
      .chart-tabs { margin-bottom: 30px; }
      .tab-button { background: #f8f9fa; border: 2px solid #e9ecef; color: #6c757d; padding: 12px 24px; margin-right: 10px; border-radius: 15px; cursor: pointer; transition: all 0.3s ease; font-weight: 600; }
      .tab-button.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-color: #667eea; color: white; }
      .tab-content { display: none; animation: fadeIn 0.5s ease; }
      .tab-content.active { display: block; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      .chart-container { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1); margin-bottom: 20px; }
      .chart-header { font-size: 18px; font-weight: 600; color: #2c3e50; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
      .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
      .stat-card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1); text-align: center; transition: transform 0.3s ease; }
      .stat-card:hover { transform: translateY(-5px); }
      .stat-icon { font-size: 36px; margin-bottom: 15px; color: #667eea; }
      .stat-value { font-size: 24px; font-weight: 700; color: #2c3e50; margin-bottom: 5px; }
      .stat-label { color: #6c757d; font-size: 14px; font-weight: 500; }
      .form-group { margin-bottom: 20px; }
      .form-group label { font-weight: 600; color: #34495e; margin-bottom: 8px; display: block; font-size: 14px; }
      .form-control { width: 100%; padding: 15px 20px; border: 2px solid #e9ecef; border-radius: 15px; font-size: 16px; transition: all 0.3s ease; background: #f8f9fa; color: #2c3e50; }
      .predict-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 15px; font-size: 18px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px; }
      .prediction-result { background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%); color: white; padding: 30px; border-radius: 20px; text-align: center; margin-top: 30px; box-shadow: 0 15px 35px rgba(78, 205, 196, 0.3); }
      .prediction-value { font-size: 32px; font-weight: 700; margin: 15px 0; }
      .loading-spinner { display: none; text-align: center; margin-top: 20px; }
      .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="main-container">
      <div class="header-section">
        <h1 class="main-title"><i class="fas fa-seedling"></i> Crop Yield Prediction</h1>
        <p class="subtitle">Please select valid features below</p>
      </div>

      <div class="form-section">
        <form action="/predict" method="post" id="predictionForm">
          <div class="form-group">
            <label for="Year"><i class="fas fa-calendar-alt"></i> Year</label>
            <input type="number" class="form-control" name="Year" value="2013" required>
          </div>
          <div class="form-group">
            <label for="average_rain_fall_mm_per_year"><i class="fas fa-cloud-rain"></i> Average Rainfall (mm/year)</label>
            <input type="number" class="form-control" name="average_rain_fall_mm_per_year" step="any" placeholder="e.g. 1083" required>
          </div>
          <div class="form-group">
            <label for="pesticides_tonnes"><i class="fas fa-spray-can"></i> Pesticides (Tonnes)</label>
            <input type="number" class="form-control" name="pesticides_tonnes" step="any" placeholder="e.g. 2550" required>
          </div>
          <div class="form-group">
            <label for="avg_temp"><i class="fas fa-thermometer-half"></i> Average Temp (°C)</label>
            <input type="number" class="form-control" name="avg_temp" step="any" placeholder="e.g. 16.3" required>
          </div>

          <div class="form-group">
            <label for="Area"><i class="fas fa-map"></i> Country / Area</label>
            <select class="form-control" name="Area" required>
                <option value="" disabled selected>Select a country</option>
                <option value="India">India</option>
                <option value="Pakistan">Pakistan</option>
                <option value="Australia">Australia</option>
                <option value="Brazil">Brazil</option>
                <option value="Canada">Canada</option>
                <option value="Egypt">Egypt</option>
                <option value="France">France</option>
                <option value="Germany">Germany</option>
                <option value="Italy">Italy</option>
                <option value="Japan">Japan</option>
                <option value="Mexico">Mexico</option>
                <option value="South Africa">South Africa</option>
                <option value="Spain">Spain</option>
                <option value="United Kingdom">United Kingdom</option>
                <option value="USA">USA</option>
            </select>
          </div>

          <div class="form-group">
            <label for="Item"><i class="fas fa-leaf"></i> Crop Item</label>
            <select class="form-control" name="Item" required>
                <option value="" disabled selected>Select a crop</option>
                <option value="Maize">Maize</option>
                <option value="Potatoes">Potatoes</option>
                <option value="Rice">Rice</option>
                <option value="Sorghum">Sorghum</option>
                <option value="Soybeans">Soybeans</option>
                <option value="Wheat">Wheat</option>
                <option value="Cassava">Cassava</option>
                <option value="Sweet potatoes">Sweet potatoes</option>
                <option value="Plantains and others">Plantains and others</option>
                <option value="Yams">Yams</option>
            </select>
          </div>

          <button type="submit" class="predict-btn" id="predictBtn">Predict Yield</button>
        </form>

        <div class="loading-spinner" id="loadingSpinner">
          <div class="spinner"></div>
          <p style="margin-top: 15px; color: #667eea;">Analyzing data...</p>
        </div>
      </div>

      {% if prediction %}
      <div class="prediction-result">
        <div class="prediction-title">Estimated Yield:</div>
        <div class="prediction-value">{{prediction}}</div>
        <div class="prediction-unit">kg/hectare</div>
      </div>
      {% endif %}
    </div>

    <div class="dashboard-container">
      <div class="header-section">
        <h1 class="dashboard-title"><i class="fas fa-chart-line"></i> Agricultural Analytics</h1>
      </div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-cloud-rain"></i></div><div class="stat-value">1,245 mm</div><div class="stat-label">Avg Rainfall</div></div>
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-thermometer-half"></i></div><div class="stat-value">23.5°C</div><div class="stat-label">Optimum Temp</div></div>
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-chart-line"></i></div><div class="stat-value">3,750 kg/ha</div><div class="stat-label">Avg Yield</div></div>
        <div class="stat-card"><div class="stat-icon"><i class="fas fa-map"></i></div><div class="stat-value">8,500 ha</div><div class="stat-label">Avg Area</div></div>
      </div>
      <div class="chart-tabs">
        <button class="tab-button active" data-tab="rainfall">Rainfall</button>
        <button class="tab-button" data-tab="temperature">Temperature</button>
        <button class="tab-button" data-tab="area">Area</button>
        <button class="tab-button" data-tab="crops">Crops</button>
      </div>
      <div class="tab-content active" id="rainfall-tab"><div class="chart-container"><canvas id="rainfallChart"></canvas></div></div>
      <div class="tab-content" id="temperature-tab"><div class="chart-container"><canvas id="temperatureChart"></canvas></div></div>
      <div class="tab-content" id="area-tab"><div class="chart-container"><canvas id="areaChart"></canvas></div></div>
      <div class="tab-content" id="crops-tab"><div class="chart-container"><canvas id="cropComparisonChart"></canvas></div></div>
    </div>

    <script>
      // Simplified Chart Initialization
      document.addEventListener('DOMContentLoaded', function() {
        const rainfallCtx = document.getElementById('rainfallChart').getContext('2d');
        new Chart(rainfallCtx, { type: 'line', data: { labels: ['2018','2019','2020','2021','2022'], datasets: [{ label: 'Yield', data: [3100, 3200, 3600, 4100, 3800], borderColor: '#667eea', tension: 0.4 }] } });

        const tempCtx = document.getElementById('temperatureChart').getContext('2d');
        new Chart(tempCtx, { type: 'bar', data: { labels: ['15°C','20°C','25°C','30°C'], datasets: [{ label: 'Stability', data: [65, 85, 95, 70], backgroundColor: '#4ecdc4' }] } });

        const areaCtx = document.getElementById('areaChart').getContext('2d');
        new Chart(areaCtx, { type: 'pie', data: { labels: ['Rice','Maize','Wheat'], datasets: [{ data: [40, 30, 30], backgroundColor: ['#ff6b6b','#4ecdc4','#feca57'] }] } });

        const cropCtx = document.getElementById('cropComparisonChart').getContext('2d');
        new Chart(cropCtx, { type: 'radar', data: { labels: ['Water','Heat','Pest','Soil','Yield'], datasets: [{ label: 'Maize', data: [8,7,9,6,8], borderColor: '#ff6b6b' }] } });

        // Tab Switching
        document.querySelectorAll('.tab-button').forEach(btn => {
          btn.addEventListener('click', function() {
            document.querySelectorAll('.tab-button, .tab-content').forEach(el => el.classList.remove('active'));
            this.classList.add('active');
            document.getElementById(this.dataset.tab + '-tab').classList.add('active');
          });
        });

        // Form Loading
        document.getElementById('predictionForm').addEventListener('submit', function() {
          document.getElementById('loadingSpinner').style.display = 'block';
          document.getElementById('predictBtn').disabled = true;
        });
      });
    </script>
  </body>
</html>
